<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080c18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Zenith">
<title>Zenith</title>
<script>
  if (location.pathname.endsWith('/') && location.pathname !== '/')
    history.replaceState(null, '', location.pathname.slice(0, -1) + location.search + location.hash);
</script>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #080c18;
  --sidebar:    #0b0f1e;
  --surface:    #111827;
  --surface2:   #162033;
  --surface3:   #1c2a40;
  --border:     #1a2540;
  --border2:    #243354;
  --accent:     #4f7ef8;
  --accent-h:   #3d6be0;
  --accent-dim: rgba(79,126,248,0.13);
  --red:        #e05252;
  --amber:      #f0a732;
  --green:      #34c97a;
  --purple:     #9b6ef7;
  --teal:       #2ec4b6;
  --text:       #e4ecf7;
  --text2:      #7a90b0;
  --text3:      #3d5070;
  --font:       'Inter', sans-serif;
  --safe-top:   env(safe-area-inset-top, 0px);
  --safe-bot:   env(safe-area-inset-bottom, 0px);
  --sb-w:       248px;
  --radius:     8px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.5; }
button { font-family: var(--font); }
input, textarea, select { font-family: var(--font); }

/* ── APP SHELL ── */
.app { display: flex; height: 100dvh; }

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sb-w); background: var(--sidebar);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  flex-shrink: 0;
  padding-top: var(--safe-top);
  overflow-y: auto; overflow-x: hidden;
}
.sidebar::-webkit-scrollbar { display: none; }

.sb-brand { display: flex; align-items: center; gap: 10px; padding: 16px 16px 10px; }
.sb-logo { width: 30px; height: 30px; border-radius: 9px; background: linear-gradient(135deg,#4f7ef8,#9b6ef7); display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 800; color: #fff; letter-spacing: -0.5px; flex-shrink: 0; }
.sb-name { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
.sb-name span { color: var(--accent); }

.sb-add-btn { display: flex; align-items: center; gap: 8px; margin: 4px 10px 6px; padding: 8px 12px; border-radius: var(--radius); border: none; background: transparent; color: var(--text2); font-size: 13px; cursor: pointer; width: calc(100% - 20px); transition: all 0.15s; text-align: left; }
.sb-add-btn:hover { background: var(--surface2); color: var(--accent); }
.sb-add-icon { width: 20px; height: 20px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 300; flex-shrink: 0; }

.sb-divider { height: 1px; background: var(--border); margin: 6px 12px; }

.sb-nav { padding: 2px 8px; }
.sb-nav-item { display: flex; align-items: center; gap: 9px; padding: 7px 10px; border-radius: var(--radius); cursor: pointer; color: var(--text2); font-size: 13px; transition: all 0.12s; border: none; background: none; width: 100%; text-align: left; }
.sb-nav-item:hover { background: var(--surface2); color: var(--text); }
.sb-nav-item.active { background: var(--accent-dim); color: var(--accent); font-weight: 500; }
.sb-nav-item svg { width: 15px; height: 15px; flex-shrink: 0; stroke-width: 2; }
.sb-nav-item .sb-badge { margin-left: auto; font-size: 11px; background: var(--surface3); color: var(--text2); border-radius: 10px; padding: 1px 7px; min-width: 20px; text-align: center; }
.sb-nav-item.active .sb-badge { background: rgba(79,126,248,0.2); color: var(--accent); }

.sb-section { margin-top: 6px; }
.sb-section-hdr { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px 4px; }
.sb-section-hdr-label { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.07em; text-transform: uppercase; }
.sb-section-hdr-add { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 17px; line-height: 1; padding: 0 2px; border-radius: 4px; transition: color 0.15s; }
.sb-section-hdr-add:hover { color: var(--accent); }

.sb-project { display: flex; align-items: center; gap: 9px; padding: 6px 10px; border-radius: var(--radius); cursor: pointer; color: var(--text2); font-size: 13px; transition: all 0.12s; position: relative; }
.sb-project:hover { background: var(--surface2); color: var(--text); }
.sb-project:hover .sb-proj-actions { opacity: 1; }
.sb-project.active { background: var(--accent-dim); color: var(--accent); }
.sb-proj-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.sb-proj-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sb-proj-count { font-size: 11px; color: var(--text3); margin-left: auto; }
.sb-proj-actions { display: flex; gap: 2px; margin-left: 4px; opacity: 0; transition: opacity 0.15s; }
.sb-proj-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 12px; padding: 2px 4px; border-radius: 4px; }
.sb-proj-btn:hover { color: var(--text); background: var(--surface3); }

.sb-fav-section { margin-top: 6px; }

.sb-bottom { margin-top: auto; border-top: 1px solid var(--border); padding: 8px; }
.sb-sync-btn { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: var(--radius); cursor: pointer; font-size: 12px; color: var(--text2); border: none; background: none; width: 100%; transition: all 0.12s; text-align: left; }
.sb-sync-btn:hover { background: var(--surface2); }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
.sync-dot.synced { background: var(--green); }
.sync-dot.syncing { background: var(--amber); animation: blink 1s infinite; }
.sync-dot.error { background: var(--red); }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:0.3} }

/* ── MAIN ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.main-progress { height: 2px; background: var(--border); flex-shrink: 0; }
.main-progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--purple)); transition: width 0.5s ease; }
.main-header { padding: calc(var(--safe-top) + 22px) 28px 12px; flex-shrink: 0; border-bottom: 1px solid var(--border); }
.main-header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.main-title { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.4px; }
.main-sub { font-size: 12px; color: var(--text2); margin-top: 3px; }
.main-header-actions { display: flex; gap: 6px; flex-shrink: 0; }
.hdr-btn { background: var(--surface); border: 1px solid var(--border2); color: var(--text2); border-radius: var(--radius); width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all 0.15s; }
.hdr-btn:hover { border-color: var(--accent); color: var(--accent); }

.panel { flex: 1; overflow-y: auto; padding: 20px 28px 40px; }
.panel::-webkit-scrollbar { width: 4px; }
.panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

/* ── SECTION BLOCKS ── */
.task-section { margin-bottom: 28px; }
.task-section-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.task-section-name { font-size: 13px; font-weight: 600; color: var(--text2); }
.task-section-progress { flex: 1; }
.task-section-bar-wrap { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; margin-top: 2px; }
.task-section-bar { height: 100%; border-radius: 99px; transition: width 0.4s ease; }
.task-section-count { font-size: 11px; color: var(--text3); white-space: nowrap; }

/* ── TASK ROWS ── */
.task-row { display: flex; align-items: flex-start; gap: 10px; padding: 8px 8px 8px 0; border-bottom: 1px solid var(--border); transition: background 0.1s; cursor: default; border-radius: 6px; }
.task-row:hover { background: rgba(255,255,255,0.02); }
.task-row:hover .t-actions { opacity: 1; }
.t-check-wrap { padding-top: 1px; flex-shrink: 0; cursor: pointer; }
.t-check { width: 17px; height: 17px; border-radius: 50%; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.task-row.done .t-check { background: var(--green); border-color: var(--green); }
.t-check svg { width: 9px; height: 9px; stroke: white; opacity: 0; stroke-width: 3; transition: opacity 0.15s; }
.task-row.done .t-check svg { opacity: 1; }
.task-row.done .t-name { color: var(--text3); text-decoration: line-through; }
.t-body { flex: 1; min-width: 0; cursor: pointer; }
.t-name { font-size: 14px; color: var(--text); }
.t-desc { font-size: 12px; color: var(--text3); margin-top: 2px; }
.t-chips { display: flex; align-items: center; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
.t-chip { font-size: 11px; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
.chip-deadline-overdue { background: rgba(224,82,82,0.15); color: var(--red); }
.chip-deadline-today   { background: rgba(240,167,50,0.15); color: var(--amber); }
.chip-deadline-soon    { background: rgba(79,126,248,0.12); color: var(--accent); }
.chip-deadline-future  { background: var(--surface2); color: var(--text2); }
.chip-proj { }
.chip-time-morning  { background: rgba(240,167,50,0.1); color: var(--amber); }
.chip-time-flexible { background: rgba(79,126,248,0.1); color: var(--accent); }
.chip-time-night    { background: rgba(155,110,247,0.1); color: var(--purple); }
.chip-time-optional { background: var(--surface2); color: var(--text3); }
.t-priority { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.p1 { background: var(--red); }
.p2 { background: var(--amber); }
.p3 { background: var(--accent); }
.p4 { background: transparent; border: 1.5px solid var(--text3); }
.t-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.15s; flex-shrink: 0; padding-top: 1px; }
.t-action { background: none; border: none; color: var(--text3); cursor: pointer; padding: 3px 5px; border-radius: 4px; font-size: 13px; transition: all 0.15s; }
.t-action:hover { color: var(--text); background: var(--surface3); }
.t-action.del:hover { color: var(--red); }
.streak-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--amber); background: rgba(240,167,50,0.1); padding: 2px 7px; border-radius: 4px; }

/* ── ADD ROW ── */
.add-row { display: flex; align-items: center; gap: 8px; padding: 9px 0; color: var(--text3); font-size: 13px; cursor: pointer; border-radius: 6px; transition: color 0.15s; }
.add-row:hover { color: var(--accent); }
.add-row svg { width: 14px; height: 14px; stroke-width: 2.5; flex-shrink: 0; }

/* ── INLINE EDIT FORM ── */
.inline-form { background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; padding: 14px; margin: 6px 0 10px; }
.if-name { width: 100%; background: transparent; border: none; font-size: 14px; font-weight: 500; color: var(--text); outline: none; }
.if-name::placeholder { color: var(--text3); }
.if-desc { width: 100%; background: transparent; border: none; font-size: 13px; color: var(--text2); outline: none; margin-top: 4px; }
.if-desc::placeholder { color: var(--text3); }
.if-toolbar { display: flex; align-items: center; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); flex-wrap: wrap; }
.if-btn { display: flex; align-items: center; gap: 4px; padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-size: 12px; cursor: pointer; transition: all 0.15s; }
.if-btn:hover { background: var(--surface2); color: var(--text); }
.if-sel { padding: 5px 8px; border-radius: 6px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text2); font-size: 12px; cursor: pointer; outline: none; }
.if-sel option { background: var(--surface2); }
.if-date { padding: 5px 8px; border-radius: 6px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text2); font-size: 12px; cursor: pointer; outline: none; color-scheme: dark; }
.if-save { margin-left: auto; background: var(--accent); border: none; color: #fff; border-radius: 6px; padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; }
.if-save:hover { background: var(--accent-h); }
.if-cancel { background: transparent; border: 1px solid var(--border2); color: var(--text2); border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer; }

/* ── CALENDAR ── */
.cal-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.cal-month { font-size: 18px; font-weight: 700; }
.cal-navs { display: flex; gap: 4px; }
.cal-nav-btn { background: var(--surface); border: 1px solid var(--border2); color: var(--text2); border-radius: 6px; width: 30px; height: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.15s; }
.cal-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.cal-today-btn { padding: 0 10px; font-size: 12px; font-weight: 500; font-family: var(--font); }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; margin-bottom: 16px; }
.cal-dow { font-size: 11px; color: var(--text3); text-align: center; padding: 5px 0; font-weight: 600; letter-spacing: 0.04em; }
.cal-cell { min-height: 76px; background: var(--surface); border: 1px solid var(--border); border-radius: 7px; padding: 6px 5px; cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; gap: 2px; }
.cal-cell:hover { border-color: var(--border2); background: var(--surface2); }
.cal-cell.other { background: transparent; border-color: transparent; opacity: 0.4; }
.cal-cell.today { border-color: var(--accent); }
.cal-cell.selected { background: var(--accent-dim); border-color: var(--accent); }
.cal-cell-num { font-size: 12px; font-weight: 600; color: var(--text2); line-height: 1; margin-bottom: 2px; }
.cal-cell.today .cal-cell-num { color: var(--accent); }
.cal-cell.selected .cal-cell-num { color: var(--accent); }
.cal-ev { font-size: 10px; padding: 1px 4px; border-radius: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; line-height: 1.4; }
.cal-ev.habit  { background: rgba(79,126,248,0.2); color: var(--accent); }
.cal-ev.task   { background: rgba(224,82,82,0.2);  color: var(--red); }
.cal-ev.gcal   { background: rgba(52,201,122,0.2); color: var(--green); }
.cal-ev.more   { background: var(--surface3); color: var(--text3); }
.cal-detail { background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; padding: 16px; }
.cal-detail-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
.cal-detail-sec { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.07em; text-transform: uppercase; margin: 12px 0 6px; }
.cal-detail-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.cal-detail-row:last-child { border-bottom: none; }
.cal-detail-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.cal-detail-done { color: var(--text3); text-decoration: line-through; }
.cal-detail-time { font-size: 11px; color: var(--text3); margin-left: auto; }

/* ── NOTES ── */
.notes-compose { background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; padding: 14px; margin-bottom: 16px; }
.notes-compose textarea { width: 100%; background: transparent; border: none; font-size: 14px; color: var(--text); outline: none; resize: none; min-height: 80px; line-height: 1.6; }
.notes-compose textarea::placeholder { color: var(--text3); }
.notes-compose-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.note-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; position: relative; }
.note-card:hover .note-del { opacity: 1; }
.note-tag-label { font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 6px; }
.note-text { font-size: 13px; color: var(--text); line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.note-time { font-size: 11px; color: var(--text3); margin-top: 8px; }
.note-del { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; opacity: 0; transition: opacity 0.15s; }
.note-del:hover { color: var(--red); }
.notes-date-grp { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.07em; text-transform: uppercase; margin: 16px 0 8px; }

/* ── SETTINGS ── */
.settings-sec { margin-bottom: 24px; }
.settings-sec-title { font-size: 12px; font-weight: 600; color: var(--text3); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 10px; }
.settings-card { background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; overflow: hidden; }
.settings-row { display: flex; align-items: center; gap: 12px; padding: 13px 16px; border-bottom: 1px solid var(--border); }
.settings-row:last-child { border-bottom: none; }
.settings-row-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 15px; }
.settings-row-body { flex: 1; }
.settings-row-label { font-size: 13px; font-weight: 500; color: var(--text); }
.settings-row-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
.settings-row-action { margin-left: auto; flex-shrink: 0; }
.s-btn { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-size: 12px; cursor: pointer; transition: all 0.15s; white-space: nowrap; font-family: var(--font); }
.s-btn:hover { background: var(--surface2); color: var(--text); }
.s-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.s-btn.primary:hover { background: var(--accent-h); }
.s-btn.danger { color: var(--red); border-color: rgba(224,82,82,0.25); }
.s-btn.danger:hover { background: rgba(224,82,82,0.08); }
.setup-input { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 7px; padding: 10px 12px; font-size: 13px; color: var(--text); outline: none; margin-bottom: 8px; }
.setup-input:focus { border-color: var(--accent); }
.info-box { background: rgba(79,126,248,0.07); border: 1px solid rgba(79,126,248,0.18); border-radius: 8px; padding: 12px; font-size: 12px; color: var(--text2); line-height: 1.8; margin-bottom: 10px; }
.info-box strong { color: var(--accent); }

/* ── MODAL ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.overlay.open { opacity: 1; pointer-events: all; }
@media(min-width:640px){ .overlay { align-items: center; } }
.modal { background: var(--surface); border-radius: 16px 16px 0 0; border: 1px solid var(--border2); width: 100%; max-width: 500px; padding: 20px 20px calc(var(--safe-bot) + 20px); transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }
@media(min-width:640px){ .modal { border-radius: 14px; transform: scale(0.95); max-width: 460px; } }
.overlay.open .modal { transform: translateY(0); }
@media(min-width:640px){ .overlay.open .modal { transform: scale(1); } }
.modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 99px; margin: 0 auto 18px; }
@media(min-width:640px){ .modal-handle { display: none; } }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; }
.modal-fi { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 7px; padding: 10px 12px; font-size: 13px; color: var(--text); outline: none; margin-bottom: 9px; }
.modal-fi:focus { border-color: var(--accent); }
select.modal-fi option { background: var(--surface2); }
input[type=date].modal-fi { color-scheme: dark; }
.modal-btns { display: flex; gap: 8px; margin-top: 6px; }
.modal-cancel { flex: 1; padding: 11px; border-radius: 8px; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-size: 13px; font-weight: 500; cursor: pointer; }
.modal-submit { flex: 2; padding: 11px; border-radius: 8px; border: none; background: var(--accent); color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; }
.modal-submit:hover { background: var(--accent-h); }

/* ── TOAST ── */
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-8px); background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 9px 18px; font-size: 13px; color: var(--text); opacity: 0; transition: all 0.22s; z-index: 999; pointer-events: none; box-shadow: 0 4px 24px rgba(0,0,0,0.5); white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── EMPTY ── */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 13px; line-height: 2; }

/* ── MOBILE NAV ── */
.mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--sidebar); border-top: 1px solid var(--border); padding: 6px 0 calc(var(--safe-bot) + 4px); z-index: 50; }
.mobile-nav-row { display: flex; justify-content: space-around; }
.mn-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 4px 10px; background: none; border: none; color: var(--text3); font-size: 10px; font-family: var(--font); cursor: pointer; border-radius: 8px; transition: color 0.15s; }
.mn-btn svg { width: 20px; height: 20px; stroke-width: 1.8; }
.mn-btn.active { color: var(--accent); }

@media(max-width:680px) {
  .sidebar { display: none; }
  .mobile-nav { display: block; }
  .panel { padding: 16px 16px calc(var(--safe-bot) + 72px); }
  .main-header { padding: calc(var(--safe-top) + 14px) 16px 10px; }
  .cal-cell { min-height: 54px; }
}

<script>
// ─── CONSTANTS ────────────────────────────────────────────────────────
const PALETTE = ['#4f7ef8','#9b6ef7','#f0a732','#34c97a','#e05252','#2ec4b6','#f06292','#ff8a65'];
const TIME_SECTIONS = [
  { key:'morning',  label:'Morning',   color:'#f0a732' },
  { key:'flexible', label:'Study & Work', color:'#4f7ef8' },
  { key:'night',    label:'Night',     color:'#9b6ef7' },
  { key:'optional', label:'Optional',  color:'#3d5070' },
];
const DEFAULT_PROJECTS = [
  { id:'daily',    name:'Daily',    color:'#4f7ef8' },
  { id:'study',    name:'Study',    color:'#9b6ef7' },
  { id:'career',   name:'Career',   color:'#f0a732' },
  { id:'personal', name:'Personal', color:'#34c97a' },
];
const DEFAULT_TASKS = [
  { id:'wake',    name:'Wake up at 6 am',       desc:'',                            project:'daily',    time:'morning',  priority:2, deadline:null, recurring:true },
  { id:'drive',   name:'Driving class',          desc:'Temporary — check schedule',  project:'personal', time:'morning',  priority:3, deadline:null, recurring:true },
  { id:'german',  name:'Study German',           desc:'45–60 min',                   project:'study',    time:'flexible', priority:2, deadline:null, recurring:true },
  { id:'math1',   name:'Study Math (session 1)', desc:'40 min',                      project:'study',    time:'flexible', priority:2, deadline:null, recurring:true },
  { id:'finance', name:'Financial theory',       desc:'30 min',                      project:'study',    time:'flexible', priority:2, deadline:null, recurring:true },
  { id:'dsa',     name:'Study DSA',              desc:'1–1.5 hrs',                   project:'study',    time:'flexible', priority:1, deadline:null, recurring:true },
  { id:'dsa2',    name:'Extra DSA session',      desc:'Optional deep dive',          project:'study',    time:'optional', priority:4, deadline:null, recurring:true },
  { id:'math2',   name:'Study Math (session 2)', desc:'40 min',                      project:'study',    time:'flexible', priority:2, deadline:null, recurring:true },
  { id:'intern',  name:'Internship hunting',     desc:'Browse listings, reach out',  project:'career',   time:'flexible', priority:1, deadline:null, recurring:true },
  { id:'resume',  name:'Resume & applications',  desc:'Refine, tailor, apply',       project:'career',   time:'flexible', priority:1, deadline:null, recurring:true },
  { id:'workout', name:'Workout',                desc:'Anytime — move your body',    project:'personal', time:'optional', priority:3, deadline:null, recurring:true },
  { id:'spanish', name:'Study Spanish',          desc:'15–30 min',                   project:'study',    time:'night',    priority:2, deadline:null, recurring:true },
];

// ─── STATE ────────────────────────────────────────────────────────────
function ls(k,d){ try{ return JSON.parse(localStorage.getItem(k)??'null')??d; }catch{ return d; } }
function sv(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} }

let tasks     = ls('z_tasks', DEFAULT_TASKS);
let projects  = ls('z_projects', DEFAULT_PROJECTS);
let favorites = ls('z_favorites', []);
let checks    = ls('z_checks', {});   // { 'YYYY-MM-DD': { taskId: bool } }
let streaks   = ls('z_streaks', {});  // { taskId: { count, last } }
let notes     = ls('z_notes', []);
let gdrive    = ls('z_gdrive', { token:null, fileId:null, connected:false, expiry:0 });
let gcal      = ls('z_gcal',   { events:[], lastSync:null });

let currentView    = 'today';
let currentProject = null;
let calDate        = new Date();
let selectedCal    = todayStr();
let editingTaskId  = null;
let editingProjId  = null;
let pickedColor    = PALETTE[0];

function todayStr(){ return new Date().toISOString().slice(0,10); }
function persist(){
  sv('z_tasks',tasks); sv('z_projects',projects); sv('z_favorites',favorites);
  sv('z_checks',checks); sv('z_streaks',streaks); sv('z_notes',notes);
  sv('z_gdrive',gdrive); sv('z_gcal',gcal);
}

// ─── AUTO-RESET (midnight) ────────────────────────────────────────────
function checkMidnightReset(){
  const today = todayStr();
  const lastOpen = ls('z_last_open','');
  if (lastOpen && lastOpen !== today) {
    // Don't wipe checks — they stay for history/streaks — just mark that today is fresh
    // Streaks: for each recurring task, if it was completed yesterday update streak
    const yesterday = lastOpen;
    const yChecks = checks[yesterday] || {};
    tasks.filter(t=>t.recurring).forEach(t => {
      const doneYesterday = !!yChecks[t.id];
      if (!streaks[t.id]) streaks[t.id] = { count:0, last:'' };
      const s = streaks[t.id];
      if (doneYesterday) {
        const prevDay = new Date(new Date(yesterday+'T12:00:00').getTime()-86400000).toISOString().slice(0,10);
        s.count = (s.last === prevDay || s.last === yesterday) ? s.count+1 : 1;
        s.last  = yesterday;
      } else {
        // Missed — reset streak only if they had one going
        if (s.last && s.last < yesterday) s.count = 0;
      }
    });
    persist();
  }
  sv('z_last_open', today);
}

// ─── VIEWS ────────────────────────────────────────────────────────────
function switchView(v, projId){
  currentView = v;
  if(projId !== undefined) currentProject = projId;
  ['today','upcoming','calendar','notes','project','settings'].forEach(p=>{
    document.getElementById('view-'+p).style.display = p===v ? 'block' : 'none';
  });
  document.querySelectorAll('[data-view]').forEach(el=>{
    el.classList.toggle('active', el.dataset.view===v && !projId);
  });
  document.querySelectorAll('.sb-project').forEach(el=>{
    el.classList.toggle('active', el.dataset.projid===currentProject && v==='project');
  });
  const titles = { today:'Today', upcoming:'Upcoming', calendar:'Calendar', notes:'Notes', settings:'Settings' };
  if (v==='project' && projId){
    const p = projects.find(p=>p.id===projId);
    document.getElementById('main-title').textContent = p ? p.name : 'Project';
  } else {
    document.getElementById('main-title').textContent = titles[v]||v;
  }
  document.getElementById('main-sub').textContent =
    v==='today' ? new Date().toLocaleDateString('en-IN',{weekday:'long',month:'long',day:'numeric',year:'numeric'}) : '';

  if(v==='today')     renderToday();
  if(v==='upcoming')  renderUpcoming();
  if(v==='calendar')  renderCalendar();
  if(v==='notes')     renderNotes();
  if(v==='project')   renderProject(projId);
  if(v==='settings')  renderSettings();
}

// ─── TODAY ────────────────────────────────────────────────────────────
function renderToday(){
  const today = todayStr();
  const tc = checks[today]||{};
  const recurring = tasks.filter(t=>t.recurring);
  const dueToday  = tasks.filter(t=>!t.recurring && t.deadline===today);
  const overdue   = tasks.filter(t=>!t.recurring && t.deadline && t.deadline<today && !tc[t.id]);
  const el = document.getElementById('today-content');
  el.innerHTML = '';

  const sections = [];
  if(overdue.length) sections.push({ label:'Overdue', items:overdue, color:'var(--red)', showStreak:false });
  TIME_SECTIONS.forEach(sec=>{
    const items = recurring.filter(t=>t.time===sec.key);
    if(items.length) sections.push({ label:sec.label, items, color:sec.color, showStreak:true });
  });
  if(dueToday.length) sections.push({ label:'Due Today', items:dueToday, color:'var(--amber)', showStreak:false });

  sections.forEach(sec=>{
    const done  = sec.items.filter(t=>tc[t.id]).length;
    const total = sec.items.length;
    const pct   = total ? Math.round(done/total*100) : 0;
    const block = document.createElement('div');
    block.className = 'task-section';
    block.innerHTML = `
      <div class="task-section-hdr">
        <span class="task-section-name" style="color:${sec.color}">${sec.label}</span>
        <div class="task-section-progress">
          <div class="task-section-bar-wrap">
            <div class="task-section-bar" style="width:${pct}%;background:${sec.color}"></div>
          </div>
        </div>
        <span class="task-section-count">${done}/${total}</span>
      </div>
      <div class="section-tasks"></div>
    `;
    const tasksEl = block.querySelector('.section-tasks');
    sec.items.forEach(t=> tasksEl.appendChild(makeRow(t, !!tc[t.id], today, sec.showStreak)));
    el.appendChild(block);
  });

  const addRow = document.createElement('div');
  addRow.className = 'add-row';
  addRow.onclick = openAddModal;
  addRow.innerHTML = `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg> Add task`;
  el.appendChild(addRow);

  updateProgress();
  updateBadge();
  renderSidebar();
}

// ─── TASK ROW ────────────────────────────────────────────────────────
function makeRow(t, isDone, today, showStreak){
  const row = document.createElement('div');
  row.className = 'task-row' + (isDone?' done':'');
  row.dataset.id = t.id;

  const proj = projects.find(p=>p.id===t.project)||{name:t.project,color:'#4f7ef8'};
  const streak = showStreak && streaks[t.id] ? streaks[t.id].count : 0;

  let deadlineChip = '';
  if(t.deadline){
    if(t.deadline < today)      deadlineChip = `<span class="t-chip chip-deadline-overdue">Overdue</span>`;
    else if(t.deadline===today) deadlineChip = `<span class="t-chip chip-deadline-today">Due today</span>`;
    else {
      const diff = Math.round((new Date(t.deadline+'T12:00:00')-new Date())/86400000);
      const lbl = diff<=3 ? `Due in ${diff}d` : fmtDate(t.deadline);
      deadlineChip = `<span class="t-chip ${diff<=3?'chip-deadline-soon':'chip-deadline-future'}">${lbl}</span>`;
    }
  }

  row.innerHTML = `
    <div class="t-priority p${t.priority||4}"></div>
    <div class="t-check-wrap"><div class="t-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg></div></div>
    <div class="t-body">
      <div class="t-name">${esc(t.name)}</div>
      ${t.desc?`<div class="t-desc">${esc(t.desc)}</div>`:''}
      <div class="t-chips">
        ${deadlineChip}
        <span class="t-chip" style="background:${proj.color}18;color:${proj.color}">${proj.name}</span>
        <span class="t-chip chip-time-${t.time}">${t.time}</span>
        ${streak>1?`<span class="streak-badge">🔥 ${streak}d</span>`:''}
      </div>
    </div>
    <div class="t-actions">
      <button class="t-action" onclick="openEditModal('${t.id}',event)" title="Edit">✎</button>
      <button class="t-action del" onclick="deleteTask('${t.id}',event)" title="Delete">✕</button>
    </div>
  `;

  row.querySelector('.t-check-wrap').addEventListener('click', e=>{ e.stopPropagation(); toggleTask(t.id); });
  row.querySelector('.t-body').addEventListener('click', ()=> openEditModal(t.id));
  return row;
}

function toggleTask(id){
  const today = todayStr();
  if(!checks[today]) checks[today]={};
  checks[today][id] = !checks[today][id];
  persist();
  rerender();
  scheduleDriveSync();
}

function deleteTask(id, e){
  e && e.stopPropagation();
  tasks = tasks.filter(t=>t.id!==id);
  persist(); rerender(); showToast('Task deleted');
}

function rerender(){
  if(currentView==='today')   renderToday();
  if(currentView==='upcoming') renderUpcoming();
  if(currentView==='calendar') renderCalendar();
  if(currentView==='project')  renderProject(currentProject);
}

// ─── PROJECT VIEW ─────────────────────────────────────────────────────
function renderProject(projId){
  const el = document.getElementById('project-content');
  el.innerHTML = '';
  const today = todayStr();
  const tc = checks[today]||{};
  let items;
  let isFav = false;

  if(projId && projId.startsWith('__fav__')){
    isFav = true;
    const favId = projId.replace('__fav__','');
    const fav = favorites.find(f=>f.id===favId);
    if(!fav){ el.innerHTML='<div class="empty-state">Favorite not found.</div>'; return; }
    items = tasks.filter(t=>{
      if(fav.filterProject && t.project!==fav.filterProject) return false;
      if(fav.filterPriority && t.priority > parseInt(fav.filterPriority)) return false;
      return true;
    });
    document.getElementById('main-title').textContent = '⭐ '+fav.name;
  } else {
    items = tasks.filter(t=>t.project===projId);
    const proj = projects.find(p=>p.id===projId);
    if(proj) document.getElementById('main-title').textContent = proj.name;
  }

  if(!items.length){
    el.innerHTML='<div class="empty-state">No tasks here yet.<br>Add one with the + button.</div>';
    renderAddRow(el, projId);
    return;
  }

  // Group by time
  TIME_SECTIONS.forEach(sec=>{
    const secItems = items.filter(t=>t.time===sec.key);
    if(!secItems.length) return;
    const done  = secItems.filter(t=>tc[t.id]).length;
    const total = secItems.length;
    const pct   = total ? Math.round(done/total*100) : 0;
    const block = document.createElement('div');
    block.className = 'task-section';
    block.innerHTML = `
      <div class="task-section-hdr">
        <span class="task-section-name" style="color:${sec.color}">${sec.label}</span>
        <div class="task-section-progress">
          <div class="task-section-bar-wrap">
            <div class="task-section-bar" style="width:${pct}%;background:${sec.color}"></div>
          </div>
        </div>
        <span class="task-section-count">${done}/${total}</span>
      </div>
      <div class="section-tasks"></div>
    `;
    const tasksEl = block.querySelector('.section-tasks');
    secItems.forEach(t=> tasksEl.appendChild(makeRow(t, !!tc[t.id], today, true)));
    el.appendChild(block);
  });
  renderAddRow(el, projId);
}
function renderAddRow(el, projId){
  const addRow = document.createElement('div');
  addRow.className = 'add-row';
  addRow.innerHTML = `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg> Add task`;
  addRow.onclick = ()=>{ openAddModal(); if(projId&&!projId.startsWith('__fav__')) document.getElementById('tf-project').value=projId; };
  el.appendChild(addRow);
}

// ─── UPCOMING ────────────────────────────────────────────────────────
function renderUpcoming(){
  const today = todayStr();
  const tc = checks[today]||{};
  const items = tasks.filter(t=>t.deadline && t.deadline>=today)
    .sort((a,b)=>a.deadline.localeCompare(b.deadline));
  const byDate = {};
  items.forEach(t=>{ if(!byDate[t.deadline]) byDate[t.deadline]=[]; byDate[t.deadline].push(t); });
  const el = document.getElementById('upcoming-content');
  if(!Object.keys(byDate).length){ el.innerHTML='<div class="empty-state">No upcoming deadlines.<br>Add a task with a deadline date.</div>'; return; }
  el.innerHTML='';
  Object.entries(byDate).forEach(([date,ts])=>{
    const done  = ts.filter(t=>tc[t.id]).length;
    const total = ts.length;
    const pct   = total ? Math.round(done/total*100) : 0;
    const sec = document.createElement('div');
    sec.className = 'task-section';
    sec.innerHTML = `
      <div class="task-section-hdr">
        <span class="task-section-name">${fmtDate(date)}</span>
        <div class="task-section-progress">
          <div class="task-section-bar-wrap">
            <div class="task-section-bar" style="width:${pct}%;background:var(--accent)"></div>
          </div>
        </div>
        <span class="task-section-count">${done}/${total}</span>
      </div>
      <div class="section-tasks"></div>
    `;
    const te = sec.querySelector('.section-tasks');
    ts.forEach(t=>te.appendChild(makeRow(t,!!tc[t.id],today,false)));
    el.appendChild(sec);
  });
}

// ─── CALENDAR ────────────────────────────────────────────────────────
function renderCalendar(){
  const y=calDate.getFullYear(), m=calDate.getMonth();
  document.getElementById('cal-month').textContent =
    calDate.toLocaleDateString('en-IN',{month:'long',year:'numeric'});
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const today = todayStr();
  const first = new Date(y,m,1).getDay();
  const dim   = new Date(y,m+1,0).getDate();
  const prev  = new Date(y,m,0).getDate();

  function cell(num, ds, other){
    const c = document.createElement('div');
    c.className = 'cal-cell'+(other?' other':'')+(ds===today?' today':'')+(ds===selectedCal?' selected':'');
    const tc    = checks[ds]||{};
    const req   = tasks.filter(t=>t.recurring&&t.time!=='optional');
    const done  = req.filter(t=>tc[t.id]).length;
    const deadlines = tasks.filter(t=>t.deadline===ds);
    const gcalEvs   = gcal.events.filter(e=>e.date===ds);
    let evs = '';
    if(done>0||req.length>0) evs += `<div class="cal-ev habit">${done}/${req.length}</div>`;
    if(deadlines.length)      evs += `<div class="cal-ev task">📌 ${esc(deadlines[0].name)}</div>`;
    if(deadlines.length>1)    evs += `<div class="cal-ev more">+${deadlines.length-1} more</div>`;
    if(gcalEvs.length)        evs += `<div class="cal-ev gcal">● ${esc(gcalEvs[0].title)}</div>`;
    c.innerHTML = `<div class="cal-cell-num">${num}</div>${evs}`;
    c.onclick   = ()=>{ selectedCal=ds; renderCalendar(); };
    return c;
  }
  for(let i=0;i<first;i++) grid.appendChild(cell(prev-first+1+i,`${y}-${String(m).padStart(2,'0')}-${String(prev-first+1+i).padStart(2,'0')}`,true));
  for(let d=1;d<=dim;d++)  grid.appendChild(cell(d,`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,false));
  const rem=42-first-dim;
  for(let d=1;d<=rem;d++)  grid.appendChild(cell(d,`${y}-${String(m+2).padStart(2,'0')}-${String(d).padStart(2,'0')}`,true));
  renderCalDetail();
}
function renderCalDetail(){
  const today = todayStr();
  const tc    = checks[selectedCal]||{};
  const d     = new Date(selectedCal+'T12:00:00');
  const label = d.toLocaleDateString('en-IN',{weekday:'long',month:'long',day:'numeric'});
  const deadlines = tasks.filter(t=>t.deadline===selectedCal);
  const gcalEvs   = gcal.events.filter(e=>e.date===selectedCal);
  let html = `<div class="cal-detail"><div class="cal-detail-title">${label}</div>`;
  if(gcalEvs.length){
    html += `<div class="cal-detail-sec">Google Calendar</div>`;
    gcalEvs.forEach(e=>{ html+=`<div class="cal-detail-row"><div class="cal-detail-dot" style="background:var(--green)"></div><span>${esc(e.title)}</span>${e.time?`<span class="cal-detail-time">${e.time}</span>`:''}</div>`; });
  }
  if(deadlines.length){
    html += `<div class="cal-detail-sec">Deadlines</div>`;
    deadlines.forEach(t=>{ const p=projects.find(p=>p.id===t.project)||{color:'#4f7ef8',name:t.project}; html+=`<div class="cal-detail-row"><div class="cal-detail-dot" style="background:${p.color}"></div><span>${esc(t.name)}</span><span class="cal-detail-time">${p.name}</span></div>`; });
  }
  html += `<div class="cal-detail-sec">Routine</div>`;
  tasks.filter(t=>t.recurring).forEach(t=>{
    const done=tc[t.id];
    html += `<div class="cal-detail-row"><div class="cal-detail-dot" style="background:${done?'var(--green)':'var(--border2)'}"></div><span class="${done?'cal-detail-done':''}">${esc(t.name)}</span></div>`;
  });
  html += '</div>';
  document.getElementById('cal-detail').innerHTML = html;
}
function calNav(dir){
  if(dir===0) calDate=new Date(); else calDate.setMonth(calDate.getMonth()+dir);
  renderCalendar();
}

function submitTaskModal(){
  const name = document.getElementById('tf-name').value.trim();
  if(!name){ showToast('Enter a task name'); return; }
  const obj = {
    name,
    desc:     document.getElementById('tf-desc').value.trim(),
    deadline: document.getElementById('tf-deadline').value||null,
    project:  document.getElementById('tf-project').value,
    priority: parseInt(document.getElementById('tf-priority').value),
    time:     document.getElementById('tf-time').value,

// ─── OAUTH / DRIVE SYNC ───────────────────────────────────────────────
function connectDrive(){ const cid=document.getElementById('client-id-input').value.trim(); if(!cid){showToast('Enter your Client ID');return;} sv('z_client_id',cid); startOAuth(cid); }
function startOAuth(cid){ const ru=location.origin+location.pathname.replace(/\/$/,''); const state='z_'+Date.now(); sv('z_oauth_state',state); location.href='https://accounts.google.com/o/oauth2/v2/auth?'+new URLSearchParams({client_id:cid,redirect_uri:ru,response_type:'token',scope:'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/calendar.readonly',state,include_granted_scopes:'true'}); }
function handleOAuth(){ const h=location.hash.slice(1); if(!h) return; const p=new URLSearchParams(h); const tok=p.get('access_token'),state=p.get('state'); if(!tok||state!==ls('z_oauth_state','')) return; history.replaceState(null,'',location.pathname); gdrive.token=tok; gdrive.connected=true; gdrive.expiry=Date.now()+(parseInt(p.get('expires_in')||'3600')*1000); persist(); updateSyncUI(); showToast('Drive connected! Syncing…'); syncDrive(); setTimeout(syncGCal,2000); }
function ensureToken(){ if(!gdrive.token||(gdrive.expiry&&Date.now()>gdrive.expiry-60000)){ const c=ls('z_client_id',''); if(c){showToast('Session expired, re-authenticating…');startOAuth(c);} return false; } return true; }
function disconnectDrive(){ gdrive={token:null,fileId:null,connected:false,expiry:0}; persist(); updateSyncUI(); renderSettings(); showToast('Disconnected'); }

let syncTimer=null;
function scheduleDriveSync(){ if(!gdrive.connected||!gdrive.token) return; clearTimeout(syncTimer); syncTimer=setTimeout(syncDrive,3000); }
async function syncNow(){ showToast('Syncing…'); await syncDrive(); }

async function syncDrive(){
  if(!ensureToken()) return;
  setSyncStatus('syncing','Syncing…');
  const data=JSON.stringify({tasks,projects,favorites,checks,streaks,notes,gcal,version:3});
  try{
    if(gdrive.fileId){
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${gdrive.fileId}?uploadType=media`,{method:'PATCH',headers:{Authorization:`Bearer ${gdrive.token}`,'Content-Type':'application/json'},body:data});
    } else {
      const meta=await fetch('https://www.googleapis.com/drive/v3/files?q=name%3D%22zenith-data.json%22',{headers:{Authorization:`Bearer ${gdrive.token}`}}).then(r=>r.json());
      if(meta.files&&meta.files.length){
        gdrive.fileId=meta.files[0].id;
        const ex=await fetch(`https://www.googleapis.com/drive/v3/files/${gdrive.fileId}?alt=media`,{headers:{Authorization:`Bearer ${gdrive.token}`}}).then(r=>r.json()).catch(()=>null);
        if(ex&&ex.version===3){ tasks=ex.tasks||tasks; projects=ex.projects||projects; favorites=ex.favorites||favorites; checks=ex.checks||checks; streaks=ex.streaks||streaks; notes=ex.notes||notes; gcal=ex.gcal||gcal; persist(); rerender(); renderSidebar(); }
        await fetch(`https://www.googleapis.com/upload/drive/v3/files/${gdrive.fileId}?uploadType=media`,{method:'PATCH',headers:{Authorization:`Bearer ${gdrive.token}`,'Content-Type':'application/json'},body:JSON.stringify({tasks,projects,favorites,checks,streaks,notes,gcal,version:3})});
      } else {
        const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{Authorization:`Bearer ${gdrive.token}`,'Content-Type':'multipart/related; boundary=foo'},body:`--foo\r\nContent-Type: application/json\r\n\r\n${JSON.stringify({name:'zenith-data.json',mimeType:'application/json'})}\r\n--foo\r\nContent-Type: application/json\r\n\r\n${data}\r\n--foo--`}).then(r=>r.json());
        gdrive.fileId=r.id;
      }
    }
    sv('z_gdrive',gdrive);
    setSyncStatus('synced','Synced '+new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}));
  } catch(e){ setSyncStatus('error','Sync failed'); }
}

async function syncGCal(){
  if(!gdrive.token){showToast('Connect Drive first');return;}
  setSyncStatus('syncing','Syncing calendar…');
  try{
    const now=new Date();
    const tMin=new Date(now.getFullYear(),now.getMonth()-1,1).toISOString();
    const tMax=new Date(now.getFullYear(),now.getMonth()+3,0).toISOString();
    const resp=await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${encodeURIComponent(tMin)}&timeMax=${encodeURIComponent(tMax)}&singleEvents=true&orderBy=startTime&maxResults=200`,{headers:{Authorization:`Bearer ${gdrive.token}`}});
    if(!resp.ok) throw new Error();
    const d=await resp.json();
    gcal.events=(d.items||[]).map(e=>({id:e.id,title:e.summary||'Event',date:(e.start.date||e.start.dateTime||'').slice(0,10),time:e.start.dateTime?new Date(e.start.dateTime).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}):null})).filter(e=>e.date);
    gcal.lastSync=new Date().toISOString();
    persist(); setSyncStatus('synced','Calendar synced'); showToast(`${gcal.events.length} calendar events synced`);
    if(currentView==='calendar') renderCalendar();
    if(currentView==='settings') renderSettings();
  } catch(e){ setSyncStatus('error','Calendar sync failed'); showToast('Calendar sync failed'); }
}

function setSyncStatus(state,label){ document.getElementById('sync-dot').className='sync-dot'+(state?' '+state:''); document.getElementById('sync-label').textContent=label; }
function updateSyncUI(){ if(gdrive.connected) setSyncStatus('synced','Drive connected'); else setSyncStatus('','Not connected'); }

// ─── UTILS ────────────────────────────────────────────────────────────
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(s){ return new Date(s+'T12:00:00').toLocaleDateString('en-IN',{weekday:'short',month:'short',day:'numeric'}); }
function resetToday(){ checks[todayStr()]={}; persist(); renderToday(); showToast('Day reset'); }
function exportData(){ const a=document.createElement('a'); a.href='data:application/json,'+encodeURIComponent(JSON.stringify({tasks,projects,favorites,checks,streaks,notes,version:3},null,2)); a.download='zenith-backup-'+todayStr()+'.json'; a.click(); showToast('Exported!'); }
function importData(){ const i=document.createElement('input'); i.type='file'; i.accept='.json'; i.onchange=e=>{ const r=new FileReader(); r.onload=ev=>{ try{ const d=JSON.parse(ev.target.result); if(d.tasks) tasks=d.tasks; if(d.projects) projects=d.projects; if(d.favorites) favorites=d.favorites; if(d.checks) checks=d.checks; if(d.streaks) streaks=d.streaks; if(d.notes) notes=d.notes; persist(); switchView(currentView); showToast('Imported!'); }catch{ showToast('Invalid file'); } }; r.readAsText(e.target.files[0]); }; i.click(); }
let toastTmr;
function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toastTmr); toastTmr=setTimeout(()=>t.classList.remove('show'),2500); }

// ─── KEYBOARD ────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.target.closest('input,textarea,select')) return;
  if(e.key==='n') openAddModal();
});
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('task-modal').classList.contains('open')) submitTaskModal();
  if(e.key==='Escape'){ closeTaskModal(); closeProjectModal(); closeFavModal(); }
});

// ─── INIT ────────────────────────────────────────────────────────────
checkMidnightReset();
handleOAuth();
updateSyncUI();
switchView('today');

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
const n=new Date();
setTimeout(()=>{ checkMidnightReset(); renderToday(); setInterval(()=>{ checkMidnightReset(); renderToday(); },86400000); }, new Date(n.getFullYear(),n.getMonth(),n.getDate()+1)-n);
</script>
