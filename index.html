<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Routine">
<title>Routine</title>
<script>
  if (location.pathname.endsWith('/') && location.pathname !== '/')
    history.replaceState(null, '', location.pathname.slice(0, -1) + location.search + location.hash);
</script>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0a0e1a;
  --sidebar:   #0d1120;
  --surface:   #131929;
  --surface2:  #1a2236;
  --surface3:  #1f2a40;
  --border:    #1e2d45;
  --border2:   #243352;
  --accent:    #4a7cf7;
  --accent-h:  #3d6de0;
  --accent-dim:#4a7cf720;
  --red:       #e05252;
  --amber:     #f0a732;
  --green:     #3ec97a;
  --purple:    #9b6ef7;
  --text:      #e8edf5;
  --text2:     #8a9bb5;
  --text3:     #4a5a78;
  --font:      'Inter', sans-serif;
  --safe-top:  env(safe-area-inset-top, 0px);
  --safe-bot:  env(safe-area-inset-bottom, 0px);
  --sidebar-w: 240px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }

/* ── LAYOUT ── */
.app { display: flex; height: 100dvh; }
.sidebar { width: var(--sidebar-w); background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; padding-top: var(--safe-top); overflow-y: auto; }
.sidebar::-webkit-scrollbar { display: none; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

/* ── SIDEBAR ── */
.sb-top { padding: 14px 12px 8px; }
.sb-brand { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; cursor: default; margin-bottom: 4px; }
.sb-brand-icon { width: 28px; height: 28px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: white; flex-shrink: 0; }
.sb-brand-name { font-weight: 600; font-size: 15px; color: var(--text); }
.sb-add { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 6px; cursor: pointer; color: var(--text2); transition: all 0.15s; margin: 4px 4px 0; font-size: 13px; border: none; background: none; width: calc(100% - 8px); text-align: left; }
.sb-add:hover { background: var(--surface2); color: var(--accent); }
.sb-add-icon { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.sb-divider { height: 1px; background: var(--border); margin: 8px 12px; }
.sb-nav { padding: 0 8px; }
.sb-item { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 6px; cursor: pointer; color: var(--text2); font-size: 13px; transition: all 0.12s; user-select: none; border: none; background: none; width: 100%; text-align: left; }
.sb-item:hover { background: var(--surface2); color: var(--text); }
.sb-item.active { background: var(--accent-dim); color: var(--accent); font-weight: 500; }
.sb-item svg { width: 16px; height: 16px; flex-shrink: 0; stroke-width: 1.8; }
.sb-item .badge { margin-left: auto; font-size: 11px; background: var(--surface3); color: var(--text2); border-radius: 10px; padding: 1px 6px; }
.sb-item.active .badge { background: var(--accent-dim); color: var(--accent); }
.sb-section { padding: 16px 8px 4px; }
.sb-section-label { display: flex; align-items: center; justify-content: space-between; padding: 4px 10px; font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; border-radius: 6px; }
.sb-section-label:hover { background: var(--surface2); color: var(--text2); }
.sb-project { display: flex; align-items: center; gap: 10px; padding: 6px 10px; border-radius: 6px; cursor: pointer; color: var(--text2); font-size: 13px; transition: all 0.12s; }
.sb-project:hover { background: var(--surface2); color: var(--text); }
.sb-project.active { background: var(--accent-dim); color: var(--accent); }
.sb-project-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.sb-project-count { margin-left: auto; font-size: 11px; color: var(--text3); }
.sb-bottom { margin-top: auto; padding: 8px; border-top: 1px solid var(--border); }
.sb-sync-row { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; color: var(--text2); transition: all 0.12s; border: none; background: none; width: 100%; text-align: left; }
.sb-sync-row:hover { background: var(--surface2); }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
.sync-dot.synced { background: var(--green); }
.sync-dot.syncing { background: var(--amber); animation: pulse 1s infinite; }
.sync-dot.error { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }

/* ── MOBILE NAV ── */
.mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--sidebar); border-top: 1px solid var(--border); padding: 8px 0 calc(var(--safe-bot) + 4px); z-index: 50; }
.mobile-nav-inner { display: flex; justify-content: space-around; }
.mnav-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 4px 16px; background: none; border: none; color: var(--text2); font-size: 10px; font-family: var(--font); cursor: pointer; border-radius: 8px; transition: color 0.15s; }
.mnav-btn svg { width: 20px; height: 20px; stroke-width: 1.8; }
.mnav-btn.active { color: var(--accent); }

/* ── MAIN HEADER ── */
.main-header { padding: calc(var(--safe-top) + 20px) 28px 0; flex-shrink: 0; }
.main-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.main-sub { font-size: 13px; color: var(--text2); }

/* ── CONTENT ── */
.panel { flex: 1; overflow-y: auto; padding: 20px 28px 40px; }
.panel::-webkit-scrollbar { width: 4px; }
.panel::-webkit-scrollbar-track { background: transparent; }
.panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

/* ── HABITS ── */
.section-hdr { display: flex; align-items: center; gap: 8px; margin: 20px 0 8px; cursor: pointer; }
.section-hdr:first-child { margin-top: 0; }
.section-hdr-label { font-size: 12px; font-weight: 600; color: var(--text2); letter-spacing: 0.04em; }
.section-hdr-line { flex: 1; height: 1px; background: var(--border); }
.section-hdr-count { font-size: 11px; color: var(--text3); }
.habit-row { display: flex; align-items: flex-start; gap: 10px; padding: 7px 10px 7px 0; border-bottom: 1px solid var(--border); transition: background 0.1s; cursor: pointer; border-radius: 6px; position: relative; }
.habit-row:hover { background: var(--surface); }
.habit-row:hover .h-actions { opacity: 1; }
.habit-check { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border2); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.habit-row.done .habit-check { background: var(--green); border-color: var(--green); }
.habit-check svg { width: 10px; height: 10px; stroke: white; opacity: 0; stroke-width: 3; transition: opacity 0.15s; }
.habit-row.done .habit-check svg { opacity: 1; }
.habit-row.done .h-name { color: var(--text3); text-decoration: line-through; }
.h-body { flex: 1; min-width: 0; }
.h-name { font-size: 14px; color: var(--text); line-height: 1.4; }
.h-meta-row { display: flex; align-items: center; gap: 8px; margin-top: 3px; flex-wrap: wrap; }
.h-meta { font-size: 12px; color: var(--text3); }
.h-deadline { font-size: 11px; padding: 1px 6px; border-radius: 4px; font-weight: 500; }
.h-deadline.overdue { background: rgba(224,82,82,0.15); color: var(--red); }
.h-deadline.today { background: rgba(240,167,50,0.15); color: var(--amber); }
.h-deadline.upcoming { background: rgba(74,124,247,0.12); color: var(--accent); }
.h-tag { font-size: 11px; padding: 1px 6px; border-radius: 4px; }
.tag-morning { background: rgba(240,167,50,0.12); color: var(--amber); }
.tag-flexible { background: rgba(74,124,247,0.12); color: var(--accent); }
.tag-night { background: rgba(155,110,247,0.12); color: var(--purple); }
.tag-optional { background: var(--surface2); color: var(--text3); }
.h-actions { display: flex; gap: 4px; margin-left: auto; opacity: 0; transition: opacity 0.15s; flex-shrink: 0; }
.h-action-btn { background: none; border: none; color: var(--text3); cursor: pointer; padding: 2px 4px; border-radius: 4px; font-size: 13px; }
.h-action-btn:hover { color: var(--text); background: var(--surface3); }
.priority-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.p1 { background: var(--red); }
.p2 { background: var(--amber); }
.p3 { background: var(--accent); }
.p4 { background: transparent; border: 1.5px solid var(--text3); }

/* ── ADD TASK INLINE ── */
.add-task-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; cursor: pointer; color: var(--text3); font-size: 13px; border-radius: 6px; transition: color 0.15s; margin-top: 4px; }
.add-task-row:hover { color: var(--accent); }
.add-task-row svg { width: 16px; height: 16px; stroke-width: 2; flex-shrink: 0; }

/* ── TASK FORM ── */
.task-form { background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; padding: 14px; margin: 8px 0; }
.task-form-name { width: 100%; background: transparent; border: none; font-family: var(--font); font-size: 14px; color: var(--text); outline: none; font-weight: 500; }
.task-form-name::placeholder { color: var(--text3); }
.task-form-desc { width: 100%; background: transparent; border: none; font-family: var(--font); font-size: 13px; color: var(--text2); outline: none; margin-top: 4px; resize: none; }
.task-form-desc::placeholder { color: var(--text3); }
.task-form-row { display: flex; align-items: center; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); flex-wrap: wrap; }
.tf-btn { display: flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-family: var(--font); font-size: 12px; cursor: pointer; transition: all 0.15s; }
.tf-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); }
.tf-btn svg { width: 13px; height: 13px; stroke-width: 2; }
.tf-btn.accent { background: var(--accent); color: white; border-color: var(--accent); margin-left: auto; }
.tf-btn.accent:hover { background: var(--accent-h); }
.tf-btn.cancel { margin-left: 4px; }
select.tf-sel { padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text2); font-family: var(--font); font-size: 12px; cursor: pointer; outline: none; }
select.tf-sel option { background: var(--surface2); }
input[type=date].tf-date { padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text2); font-family: var(--font); font-size: 12px; cursor: pointer; outline: none; color-scheme: dark; }

/* ── CALENDAR ── */
.cal-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.cal-month-label { font-size: 17px; font-weight: 700; }
.cal-nav-btns { display: flex; gap: 6px; }
.cal-nav-btn { background: var(--surface); border: 1px solid var(--border2); color: var(--text2); border-radius: 6px; width: 30px; height: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all 0.15s; }
.cal-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; margin-bottom: 20px; }
.cal-dow { font-size: 11px; color: var(--text3); text-align: center; padding: 6px 0; font-weight: 500; letter-spacing: 0.04em; }
.cal-day { min-height: 72px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 6px; cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; gap: 2px; }
.cal-day:hover { border-color: var(--accent); background: var(--surface2); }
.cal-day.other-month { background: var(--bg); border-color: var(--border); opacity: 0.5; }
.cal-day.today { border-color: var(--accent); }
.cal-day.selected { background: var(--accent-dim); border-color: var(--accent); }
.cal-day-num { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 2px; }
.cal-day.today .cal-day-num { color: var(--accent); }
.cal-day.selected .cal-day-num { color: var(--accent); }
.cal-event { font-size: 10px; padding: 1px 5px; border-radius: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
.cal-event.habit { background: rgba(74,124,247,0.2); color: var(--accent); }
.cal-event.task { background: rgba(224,82,82,0.2); color: var(--red); }
.cal-event.gcal { background: rgba(62,201,122,0.2); color: var(--green); }
.cal-event.more { background: var(--surface3); color: var(--text2); }
.cal-detail { background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; padding: 16px; }
.cal-detail-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text); }
.cal-detail-section { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; margin: 12px 0 6px; }
.cal-detail-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.cal-detail-item:last-child { border-bottom: none; }
.cal-detail-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.cal-detail-done { color: var(--text3); text-decoration: line-through; }
.cal-detail-time { font-size: 11px; color: var(--text3); margin-left: auto; }

/* ── NOTES ── */
.notes-composer { background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; padding: 14px; margin-bottom: 16px; }
.notes-composer textarea { width: 100%; background: transparent; border: none; font-family: var(--font); font-size: 14px; color: var(--text); outline: none; resize: none; min-height: 80px; line-height: 1.6; }
.notes-composer textarea::placeholder { color: var(--text3); }
.notes-composer-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.note-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; position: relative; }
.note-card:hover .note-del { opacity: 1; }
.note-tag { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
.note-text { font-size: 13px; color: var(--text); line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.note-time { font-size: 11px; color: var(--text3); margin-top: 8px; }
.note-del { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; opacity: 0; transition: opacity 0.15s; }
.note-del:hover { color: var(--red); }
.notes-date-group { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; margin: 16px 0 8px; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 13px; line-height: 2; }

/* ── SETTINGS ── */
.settings-section { margin-bottom: 24px; }
.settings-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 12px; letter-spacing: 0.04em; }
.settings-card { background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; overflow: hidden; }
.settings-row { display: flex; align-items: center; gap: 12px; padding: 13px 16px; border-bottom: 1px solid var(--border); }
.settings-row:last-child { border-bottom: none; }
.settings-row-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.settings-row-body { flex: 1; }
.settings-row-label { font-size: 13px; font-weight: 500; color: var(--text); }
.settings-row-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
.settings-row-action { margin-left: auto; }
.settings-btn { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-family: var(--font); font-size: 12px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.settings-btn:hover { background: var(--surface2); color: var(--text); }
.settings-btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
.settings-btn.primary:hover { background: var(--accent-h); }
.settings-btn.danger { color: var(--red); border-color: rgba(224,82,82,0.3); }
.settings-btn.danger:hover { background: rgba(224,82,82,0.1); }
.info-box { background: var(--accent-dim); border: 1px solid rgba(74,124,247,0.2); border-radius: 8px; padding: 12px; font-size: 12px; color: var(--text2); line-height: 1.7; margin-bottom: 12px; }
.info-box strong { color: var(--accent); }
.setup-input { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 10px 12px; font-family: var(--font); font-size: 13px; color: var(--text); outline: none; margin-bottom: 8px; }
.setup-input:focus { border-color: var(--accent); }

/* ── MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
@media(min-width:600px){ .modal-overlay { align-items: center; } }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--surface); border-radius: 16px 16px 0 0; border: 1px solid var(--border2); width: 100%; max-width: 480px; padding: 20px 20px calc(var(--safe-bot) + 20px); transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }
@media(min-width:600px){ .modal { border-radius: 16px; transform: scale(0.95); } }
.modal-overlay.open .modal { transform: translateY(0); }
@media(min-width:600px){ .modal-overlay.open .modal { transform: scale(1); } }
.modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 99px; margin: 0 auto 18px; }
@media(min-width:600px){ .modal-handle { display: none; } }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.modal-fi { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 10px 12px; font-family: var(--font); font-size: 13px; color: var(--text); outline: none; margin-bottom: 10px; }
.modal-fi:focus { border-color: var(--accent); }
select.modal-fi option { background: var(--surface2); }
input[type=date].modal-fi { color-scheme: dark; }
.modal-btns { display: flex; gap: 8px; margin-top: 6px; }
.modal-cancel { flex: 1; padding: 11px; border-radius: 8px; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-family: var(--font); font-size: 13px; font-weight: 500; cursor: pointer; }
.modal-submit { flex: 2; padding: 11px; border-radius: 8px; border: none; background: var(--accent); color: white; font-family: var(--font); font-size: 13px; font-weight: 600; cursor: pointer; }
.modal-submit:hover { background: var(--accent-h); }

/* ── TOAST ── */
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-10px); background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 9px 18px; font-size: 13px; color: var(--text); opacity: 0; transition: all 0.25s; z-index: 999; white-space: nowrap; pointer-events: none; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── PROGRESS BAR (top) ── */
.progress-bar-top { height: 2px; background: var(--border); flex-shrink: 0; }
.progress-bar-top-fill { height: 100%; background: var(--accent); transition: width 0.5s ease; }

/* ── RESPONSIVE ── */
@media(max-width:700px) {
  .sidebar { display: none; }
  .mobile-nav { display: block; }
  .panel { padding: 16px 16px calc(var(--safe-bot) + 70px); }
  .main-header { padding: calc(var(--safe-top) + 14px) 16px 0; }
  .cal-day { min-height: 52px; }
}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-top">
      <div class="sb-brand">
        <div class="sb-brand-icon">R</div>
        <span class="sb-brand-name">Routine</span>
      </div>
      <button class="sb-add" onclick="openAddModal()">
        <div class="sb-add-icon">+</div>
        Add task
      </button>
    </div>
    <div class="sb-divider"></div>
    <nav class="sb-nav">
      <button class="sb-item active" data-view="today" onclick="switchView('today')">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Today
        <span class="badge" id="today-badge">0</span>
      </button>

<script>
// ─── DATA ────────────────────────────────────────────────────────────
const DEFAULT_TASKS = [
  { id:'wake',    name:'Wake up at 6 am',         desc:'',                                   project:'daily',    time:'morning',  priority:2, deadline:null, recurring:true },
  { id:'drive',   name:'Driving class',            desc:'Temporary — check schedule',         project:'personal', time:'morning',  priority:3, deadline:null, recurring:true },
  { id:'german',  name:'Study German',             desc:'45–60 min · flexible timing',        project:'study',    time:'flexible', priority:2, deadline:null, recurring:true },
  { id:'math1',   name:'Study Math (session 1)',   desc:'40 min · flexible timing',           project:'study',    time:'flexible', priority:2, deadline:null, recurring:true },
  { id:'finance', name:'Financial theory',         desc:'30 min · flexible timing',           project:'study',    time:'flexible', priority:2, deadline:null, recurring:true },
  { id:'dsa',     name:'Study DSA',                desc:'1–1.5 hrs · flexible timing',        project:'study',    time:'flexible', priority:1, deadline:null, recurring:true },
  { id:'dsa2',    name:'Extra DSA session',        desc:'Deep dive when in flow',             project:'study',    time:'optional', priority:4, deadline:null, recurring:true },
  { id:'math2',   name:'Study Math (session 2)',   desc:'40 min · flexible timing',           project:'study',    time:'flexible', priority:2, deadline:null, recurring:true },
  { id:'intern',  name:'Internship hunting',       desc:'Browse listings, reach out',         project:'career',   time:'flexible', priority:1, deadline:null, recurring:true },
  { id:'resume',  name:'Resume & applications',    desc:'Refine, tailor, apply',              project:'career',   time:'flexible', priority:1, deadline:null, recurring:true },
  { id:'workout', name:'Workout',                  desc:'Anytime — move your body',           project:'personal', time:'optional', priority:3, deadline:null, recurring:true },
  { id:'spanish', name:'Study Spanish',            desc:'15–30 min · night',                  project:'study',    time:'night',    priority:2, deadline:null, recurring:true },
];

const PROJECTS = {
  daily:    { label:'Daily',    color:'#4a7cf7' },
  study:    { label:'Study',    color:'#9b6ef7' },
  career:   { label:'Career',   color:'#f0a732' },
  personal: { label:'Personal', color:'#3ec97a' },
};

function todayStr() { return new Date().toISOString().slice(0,10); }
function loadLS(k,d){ try{ return JSON.parse(localStorage.getItem(k)??'null')??d; }catch{ return d; } }
function saveLS(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} }

let tasks   = loadLS('rt2_tasks', DEFAULT_TASKS);
let checks  = loadLS('rt2_checks', {});
let notes   = loadLS('rt2_notes', []);
let streak  = loadLS('rt2_streak', { count:0, last:'' });
let gdrive  = loadLS('rt2_gdrive', { token:null, fileId:null, connected:false, expiry:0 });
let gcal    = loadLS('rt2_gcal', { events:[], lastSync:null });
let currentView = 'today';
let calDate = new Date();
let selectedCalDay = todayStr();

function persist() {
  saveLS('rt2_tasks', tasks);
  saveLS('rt2_checks', checks);
  saveLS('rt2_notes', notes);
  saveLS('rt2_streak', streak);
  saveLS('rt2_gdrive', gdrive);
  saveLS('rt2_gcal', gcal);
}

// ─── VIEWS ───────────────────────────────────────────────────────────
function switchView(v) {
  currentView = v;
  ['today','upcoming','calendar','notes','settings'].forEach(p => {
    document.getElementById('view-' + p).style.display = p === v ? 'block' : 'none';
  });
  document.querySelectorAll('[data-view]').forEach(el => {
    el.classList.toggle('active', el.dataset.view === v);
  });
  const titles = { today:'Today', upcoming:'Upcoming', calendar:'Calendar', notes:'Notes', settings:'Settings' };
  document.getElementById('main-title').textContent = titles[v] || v;
  if (v==='today') renderToday();
  if (v==='upcoming') renderUpcoming();
  if (v==='calendar') renderCalendar();
  if (v==='notes') renderNotes();
  if (v==='settings') renderSettings();
  updateSub();
}

function updateSub() {
  const d = new Date();
  const sub = d.toLocaleDateString('en-IN',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  document.getElementById('main-sub').textContent = currentView==='today' ? sub : '';
}

// ─── TODAY ───────────────────────────────────────────────────────────
function renderToday() {
  const today = todayStr();
  const todayChecks = checks[today] || {};
  const recurring = tasks.filter(t => t.recurring);
  const oneOff = tasks.filter(t => !t.recurring && t.deadline === today);
  const overdue = tasks.filter(t => !t.recurring && t.deadline && t.deadline < today && !todayChecks[t.id]);
  const el = document.getElementById('today-content');
  const sections = [];
  if (overdue.length) sections.push({ label:'Overdue', items: overdue, labelColor: 'var(--red)' });
  sections.push({ label: 'Daily routine', items: recurring });
  if (oneOff.length) sections.push({ label: 'Due today', items: oneOff });
  el.innerHTML = '';
  sections.forEach(sec => {
    const hdr = document.createElement('div');
    hdr.className = 'section-hdr';
    const done = sec.items.filter(t => todayChecks[t.id]).length;
    hdr.innerHTML = `<span class="section-hdr-label" style="color:${sec.labelColor||'var(--text2)'}">${sec.label}</span><div class="section-hdr-line"></div><span class="section-hdr-count">${done}/${sec.items.length}</span>`;
    el.appendChild(hdr);
    sec.items.forEach(t => el.appendChild(makeTaskRow(t, todayChecks[t.id], today)));
  });
  const addRow = document.createElement('div');
  addRow.className = 'add-task-row';
  addRow.onclick = openAddModal;
  addRow.innerHTML = `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg> Add task`;
  el.appendChild(addRow);
  updateProgress();
  updateTodayBadge();
  renderProjectsSidebar();
}

function makeTaskRow(t, isDone, today) {
  const row = document.createElement('div');
  row.className = 'habit-row' + (isDone ? ' done' : '');
  const deadlineHtml = t.deadline ? (() => {
    const cls = t.deadline < today ? 'overdue' : t.deadline === today ? 'today' : 'upcoming';
    const label = t.deadline < today ? 'Overdue' : t.deadline === today ? 'Today' : formatDate(t.deadline);
    return `<span class="h-deadline ${cls}">${label}</span>`;
  })() : '';
  const proj = PROJECTS[t.project] || PROJECTS.daily;
  row.innerHTML = `
    <div class="priority-dot p${t.priority||4}"></div>
    <div class="habit-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg></div>
    <div class="h-body">
      <div class="h-name">${escHtml(t.name)}</div>
      <div class="h-meta-row">
        ${t.desc ? `<span class="h-meta">${escHtml(t.desc)}</span>` : ''}
        ${deadlineHtml}
        <span class="h-tag tag-${t.time}">${t.time}</span>
        <span class="h-tag" style="background:${proj.color}18;color:${proj.color}">${proj.label}</span>
      </div>
    </div>
    <div class="h-actions">
      <button class="h-action-btn" onclick="deleteTask('${t.id}',event)" title="Delete">✕</button>
    </div>
  `;
  row.querySelector('.habit-check').addEventListener('click', e => { e.stopPropagation(); toggleTask(t.id); });
  row.querySelector('.h-body').addEventListener('click', () => toggleTask(t.id));
  return row;
}

function toggleTask(id) {
  const today = todayStr();
  if (!checks[today]) checks[today] = {};
  checks[today][id] = !checks[today][id];
  persist();
  if (currentView==='today') renderToday();
  updateProgress();
  scheduleDriveSync();
}

function deleteTask(id, e) {
  e && e.stopPropagation();
  tasks = tasks.filter(t => t.id !== id);
  persist();
  renderToday();
  scheduleDriveSync();
  showToast('Task deleted');
}

function updateProgress() {
  const today = todayStr();
  const todayChecks = checks[today] || {};
  const required = tasks.filter(t => t.recurring && t.time !== 'optional');
  const done = required.filter(t => todayChecks[t.id]).length;
  const pct = required.length ? Math.round((done/required.length)*100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  if (done === required.length && required.length > 0) {
    const s = streak.last !== today;
    if (s) {
      const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
      streak.count = streak.last === yesterday ? streak.count + 1 : 1;
      streak.last = today;
      saveLS('rt2_streak', streak);
    }
  }
}

function updateTodayBadge() {
  const today = todayStr();
  const todayChecks = checks[today] || {};
  const remaining = tasks.filter(t => t.recurring && t.time !== 'optional' && !todayChecks[t.id]).length;
  document.getElementById('today-badge').textContent = remaining;
}

// ─── UPCOMING ────────────────────────────────────────────────────────
function renderUpcoming() {
  const today = todayStr();
  const upcoming = tasks.filter(t => t.deadline && t.deadline >= today)
    .sort((a,b) => a.deadline.localeCompare(b.deadline));
  const byDate = {};
  upcoming.forEach(t => {
    if (!byDate[t.deadline]) byDate[t.deadline] = [];
    byDate[t.deadline].push(t);
  });
  const el = document.getElementById('upcoming-content');
  if (!Object.keys(byDate).length) {
    el.innerHTML = '<div class="empty-state">No upcoming tasks with deadlines.<br>Add a task with a deadline to see it here.</div>';
    return;
  }
  el.innerHTML = '';
  Object.entries(byDate).forEach(([date, items]) => {
    const hdr = document.createElement('div');
    hdr.className = 'section-hdr';
    hdr.innerHTML = `<span class="section-hdr-label">${formatDate(date)}</span><div class="section-hdr-line"></div>`;
    el.appendChild(hdr);
    items.forEach(t => el.appendChild(makeTaskRow(t, (checks[today]||{})[t.id], today)));
  });
}

// ─── CALENDAR ────────────────────────────────────────────────────────
function renderCalendar() {
  const y = calDate.getFullYear(), m = calDate.getMonth();
  document.getElementById('cal-month-label').textContent =
    calDate.toLocaleDateString('en-IN',{month:'long',year:'numeric'});
  const grid = document.getElementById('cal-grid');
  const dows = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  grid.innerHTML = dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const today = todayStr();
  const first = new Date(y,m,1).getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const prevDays = new Date(y,m,0).getDate();

  function makeDay(num, dateStr, other) {
    const el = document.createElement('div');
    el.className = 'cal-day' + (other?' other-month':'') + (dateStr===today?' today':'') + (dateStr===selectedCalDay?' selected':'');
    const dayChecks = checks[dateStr] || {};
    const required = tasks.filter(t=>t.recurring && t.time!=='optional');
    const done = required.filter(t=>dayChecks[t.id]).length;
    const deadlines = tasks.filter(t=>t.deadline===dateStr);
    const gcalEvents = gcal.events.filter(e=>e.date===dateStr);
    let events = '';
    if (done > 0) events += `<div class="cal-event habit">${done}/${required.length} done</div>`;
    deadlines.slice(0,1).forEach(t => { events += `<div class="cal-event task">📌 ${escHtml(t.name)}</div>`; });
    if (deadlines.length > 1) events += `<div class="cal-event more">+${deadlines.length-1} more</div>`;
    gcalEvents.slice(0,1).forEach(e => { events += `<div class="cal-event gcal">● ${escHtml(e.title)}</div>`; });
    el.innerHTML = `<div class="cal-day-num">${num}</div>${events}`;
    el.onclick = () => { selectedCalDay = dateStr; renderCalendar(); };
    return el;
  }

  for (let i=0;i<first;i++) {
    const d = prevDays-first+1+i;
    grid.appendChild(makeDay(d, `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`, true));
  }
  for (let d=1;d<=daysInMonth;d++) {
    grid.appendChild(makeDay(d, `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`, false));
  }
  const rem = 42-first-daysInMonth;
  for (let d=1;d<=rem;d++) {
    grid.appendChild(makeDay(d, `${y}-${String(m+2).padStart(2,'0')}-${String(d).padStart(2,'0')}`, true));
  }
  renderCalDetail();
}

function renderCalDetail() {
  const today = todayStr();
  const dayChecks = checks[selectedCalDay] || {};
  const d = new Date(selectedCalDay + 'T12:00:00');
  const label = d.toLocaleDateString('en-IN',{weekday:'long',month:'long',day:'numeric'});
  const deadlines = tasks.filter(t=>t.deadline===selectedCalDay);
  const gcalEvents = gcal.events.filter(e=>e.date===selectedCalDay);
  const recurringItems = tasks.filter(t=>t.recurring);
  const el = document.getElementById('cal-detail');
  let html = `<div class="cal-detail"><div class="cal-detail-title">${label}</div>`;
  if (gcalEvents.length) {
    html += `<div class="cal-detail-section">Google Calendar</div>`;
    gcalEvents.forEach(e => {
      html += `<div class="cal-detail-item"><div class="cal-detail-dot" style="background:var(--green)"></div><span>${escHtml(e.title)}</span>${e.time?`<span class="cal-detail-time">${e.time}</span>`:''}</div>`;
    });
  }
  if (deadlines.length) {
    html += `<div class="cal-detail-section">Deadlines</div>`;
    deadlines.forEach(t => {
      const proj = PROJECTS[t.project]||PROJECTS.daily;
      html += `<div class="cal-detail-item"><div class="cal-detail-dot" style="background:${proj.color}"></div><span>${escHtml(t.name)}</span><span class="cal-detail-time">${proj.label}</span></div>`;
    });
  }
  html += `<div class="cal-detail-section">Routine</div>`;
  recurringItems.forEach(t => {
    const done = dayChecks[t.id];
    html += `<div class="cal-detail-item"><div class="cal-detail-dot" style="background:${done?'var(--green)':'var(--border2)'}"></div><span class="${done?'cal-detail-done':''}">${escHtml(t.name)}</span></div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

function calNav(dir) {
  if (dir===0) { calDate=new Date(); }

function renderProjectsSidebar() {

// ─── NOTES ───────────────────────────────────────────────────────────
function renderNotes() {
  const el = document.getElementById('notes-list');
  if (!notes.length) { el.innerHTML = '<div class="empty-state">No notes yet.<br>Write your first one above.</div>'; return; }
  const byDate = {};
  [...notes].reverse().forEach(n => {
    const d = n.ts.slice(0,10);
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(n);
  });
  const tagColors = { study:'var(--purple)', personal:'var(--green)', idea:'var(--amber)', general:'var(--text3)' };
  el.innerHTML = '';
  Object.entries(byDate).forEach(([date,nts]) => {
    const lbl = document.createElement('div');
    lbl.className = 'notes-date-group';
    lbl.textContent = new Date(date+'T12:00:00').toLocaleDateString('en-IN',{weekday:'long',month:'long',day:'numeric'});
    el.appendChild(lbl);
    nts.forEach(n => {
      const card = document.createElement('div');
      card.className = 'note-card';
      card.innerHTML = `
        <div class="note-tag" style="color:${tagColors[n.tag]||'var(--text3)'}">${n.tag}</div>
        <div class="note-text">${escHtml(n.text)}</div>
        <div class="note-time">${new Date(n.ts).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</div>
        <button class="note-del" onclick="deleteNote('${n.id}')">✕</button>
      `;
      el.appendChild(card);
    });
  });
}
function saveNote() {
  const text = document.getElementById('note-input').value.trim();
  if (!text) return;
  notes.push({ id:'n_'+Date.now(), text, tag: document.getElementById('note-tag').value, ts: new Date().toISOString() });
  persist(); document.getElementById('note-input').value = '';
  renderNotes(); showToast('Note saved'); scheduleDriveSync();
}
function deleteNote(id) { notes=notes.filter(n=>n.id!==id); persist(); renderNotes(); }

// ─── GOOGLE CALENDAR ─────────────────────────────────────────────────
async function syncGoogleCalendar() {
  if (!gdrive.token) { showToast('Connect Drive first'); return; }
  showToast('Fetching calendar…');
  setSyncStatus('syncing','Syncing calendar…');
  try {
    const now = new Date();
    const tMin = new Date(now.getFullYear(), now.getMonth()-1, 1).toISOString();
    const tMax = new Date(now.getFullYear(), now.getMonth()+3, 0).toISOString();
    const resp = await fetch(
      `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${encodeURIComponent(tMin)}&timeMax=${encodeURIComponent(tMax)}&singleEvents=true&orderBy=startTime&maxResults=200`,
      { headers: { Authorization: `Bearer ${gdrive.token}` } }
    );
    if (!resp.ok) throw new Error('Calendar API error');
    const data = await resp.json();
    gcal.events = (data.items||[]).map(e => ({
      id: e.id,
      title: e.summary || 'Event',
      date: (e.start.date || e.start.dateTime || '').slice(0,10),
      time: e.start.dateTime ? new Date(e.start.dateTime).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}) : null,
    })).filter(e=>e.date);
    gcal.lastSync = new Date().toISOString();
    persist();
    setSyncStatus('synced','Calendar synced');
    showToast(`Synced ${gcal.events.length} calendar events`);
    if (currentView==='calendar') renderCalendar();
    renderSettings();
  } catch(e) {
    setSyncStatus('error','Calendar sync failed');
    showToast('Calendar sync failed — check Drive scope includes Calendar');
  }
}

// ─── GOOGLE DRIVE OAUTH (redirect flow) ──────────────────────────────
function connectDrive() {
  const clientId = document.getElementById('client-id-input').value.trim();
  if (!clientId) { showToast('Enter your Client ID first'); return; }
  saveLS('rt2_client_id', clientId);
  startOAuthRedirect(clientId);
}

function startOAuthRedirect(clientId) {
  const redirectUri = location.origin + location.pathname.replace(/\/$/, '');
  const state = 'gdrive_' + Date.now();
  saveLS('rt2_oauth_state', state);
  const params = new URLSearchParams({
    client_id: clientId,
    redirect_uri: redirectUri,
    response_type: 'token',
    scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/calendar.readonly',
    state,
    include_granted_scopes: 'true',
  });
  location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();
}

function handleOAuthRedirect() {
  const hash = location.hash.slice(1);
  if (!hash) return;
  const params = new URLSearchParams(hash);
  const token = params.get('access_token');
  const state = params.get('state');
  if (!token || !state || state !== loadLS('rt2_oauth_state','')) return;
  history.replaceState(null, '', location.pathname);
  gdrive.token = token;
  gdrive.connected = true;
  gdrive.expiry = Date.now() + (parseInt(params.get('expires_in')||'3600')*1000);
  persist();
  updateSyncUI();
  showToast('Drive connected! Syncing…');
  syncToDrive();
  setTimeout(syncGoogleCalendar, 1500);
}

function ensureToken() {
  if (!gdrive.token || (gdrive.expiry && Date.now() > gdrive.expiry - 60000)) {
    const clientId = loadLS('rt2_client_id','');
    if (clientId) { showToast('Session expired, re-authenticating…'); startOAuthRedirect(clientId); }
    return false;
  }
  return true;
}

function disconnectDrive() {
  gdrive = { token:null, fileId:null, connected:false, expiry:0 };
  persist(); updateSyncUI(); renderSettings(); showToast('Disconnected');
}

// ─── DRIVE SYNC ──────────────────────────────────────────────────────
let syncTimer = null;
function scheduleDriveSync() {
  if (!gdrive.connected || !gdrive.token) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(syncToDrive, 3000);
}

async function syncToDrive() {
  if (!ensureToken()) return;
  setSyncStatus('syncing','Syncing…');
  const data = JSON.stringify({ tasks, checks, notes, streak, gcal, version:2 });
  try {
    if (gdrive.fileId) {
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${gdrive.fileId}?uploadType=media`, {
        method:'PATCH', headers:{ Authorization:`Bearer ${gdrive.token}`, 'Content-Type':'application/json' }, body:data
      });
    } else {
      const meta = await fetch('https://www.googleapis.com/drive/v3/files?q=name%3D%22routine-data-v2.json%22&spaces=drive', {
        headers:{ Authorization:`Bearer ${gdrive.token}` }
      }).then(r=>r.json());
      if (meta.files && meta.files.length) {
        gdrive.fileId = meta.files[0].id;
        const existing = await fetch(`https://www.googleapis.com/drive/v3/files/${gdrive.fileId}?alt=media`, {
          headers:{ Authorization:`Bearer ${gdrive.token}` }
        }).then(r=>r.json()).catch(()=>null);
        if (existing && existing.version===2) {
          tasks = existing.tasks||tasks; checks=existing.checks||checks;
          notes=existing.notes||notes; streak=existing.streak||streak;
          gcal=existing.gcal||gcal; persist();
          if (currentView==='today') renderToday();
          if (currentView==='calendar') renderCalendar();
        }
        await fetch(`https://www.googleapis.com/upload/drive/v3/files/${gdrive.fileId}?uploadType=media`, {
          method:'PATCH', headers:{ Authorization:`Bearer ${gdrive.token}`, 'Content-Type':'application/json' },
          body: JSON.stringify({ tasks, checks, notes, streak, gcal, version:2 })
        });
      } else {
        const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
          method:'POST',
          headers:{ Authorization:`Bearer ${gdrive.token}`, 'Content-Type':'multipart/related; boundary=foo' },
          body:`--foo\r\nContent-Type: application/json\r\n\r\n${JSON.stringify({name:'routine-data-v2.json',mimeType:'application/json'})}\r\n--foo\r\nContent-Type: application/json\r\n\r\n${data}\r\n--foo--`
        }).then(r=>r.json());
        gdrive.fileId = res.id;
      }
    }
    saveLS('rt2_gdrive', gdrive);
    setSyncStatus('synced','Synced '+new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}));
  } catch(e) { setSyncStatus('error','Sync failed'); }
}

async function syncNow() { showToast('Syncing…'); await syncToDrive(); }

function setSyncStatus(state, label) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot' + (state?' '+state:'');
  document.getElementById('sync-label').textContent = label;
}

function updateSyncUI() {
  if (gdrive.connected) setSyncStatus('synced','Drive connected');
  else setSyncStatus('','Not connected');
}

// ─── ADD TASK ────────────────────────────────────────────────────────
function openAddModal() {
  document.getElementById('new-task-deadline').value = todayStr();
  document.getElementById('add-modal').classList.add('open');
  setTimeout(()=>document.getElementById('new-task-name').focus(),100);
}
function closeAddModal() {
  document.getElementById('add-modal').classList.remove('open');
  document.getElementById('new-task-name').value='';
  document.getElementById('new-task-desc').value='';
}
function addTask() {
  const name = document.getElementById('new-task-name').value.trim();
  if (!name) { showToast('Enter a task name'); return; }
  const deadline = document.getElementById('new-task-deadline').value || null;
  const project = document.getElementById('new-task-project').value;
  const priority = parseInt(document.getElementById('new-task-priority').value);
  const time = document.getElementById('new-task-time').value;
  const desc = document.getElementById('new-task-desc').value.trim();
  tasks.push({ id:'t_'+Date.now(), name, desc, project, time, priority, deadline, recurring: !deadline });
  persist(); closeAddModal();
  if (currentView==='today') renderToday();
  if (currentView==='upcoming') renderUpcoming();
  if (currentView==='calendar') renderCalendar();
  showToast('Task added'); scheduleDriveSync();
}
document.getElementById('add-modal').addEventListener('click', e => {
  if (e.target===document.getElementById('add-modal')) closeAddModal();
});

// ─── UTILS ───────────────────────────────────────────────────────────
function formatDate(str) {
  const d = new Date(str+'T12:00:00');
  return d.toLocaleDateString('en-IN',{weekday:'short',month:'short',day:'numeric'});
}
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function resetDay() {
  checks[todayStr()]={};  persist();
  if(currentView==='today') renderToday();
  showToast('Day reset');
}
function exportData() {
  const a=document.createElement('a');
  a.href='data:application/json,'+encodeURIComponent(JSON.stringify({tasks,checks,notes,streak,version:2},null,2));
  a.download='routine-backup-'+todayStr()+'.json'; a.click(); showToast('Exported!');
}
function importData() {
  const input=document.createElement('input'); input.type='file'; input.accept='.json';
  input.onchange=e=>{
    const r=new FileReader();
    r.onload=ev=>{ try{
      const d=JSON.parse(ev.target.result);
      if(d.tasks) tasks=d.tasks; if(d.checks) checks=d.checks;
      if(d.notes) notes=d.notes; if(d.streak) streak=d.streak;
      persist(); switchView(currentView); showToast('Imported!');
    }catch{ showToast('Invalid file'); }};
    r.readAsText(e.target.files[0]);
  }; input.click();
}
let toastTimer;
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

// ─── KEYBOARD ────────────────────────────────────────────────────────
document.addEventListener('keydown', e=>{
  if (e.key==='Enter' && document.getElementById('add-modal').classList.contains('open')) addTask();
  if (e.key==='Escape') closeAddModal();
  if (e.key==='n' && !e.target.closest('input,textarea,select')) openAddModal();
});
